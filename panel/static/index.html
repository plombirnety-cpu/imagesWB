<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Print Factory — панель генерации принтов</title>
<style>
  :root{
    --bg:#1e1f24; --panel:#26272e; --panel2:#2e2f37; --line:#3a3b45;
    --text:#e8e8ec; --muted:#9a9ba6; --accent:#0bA34d; --accent2:#0a58ca;
    --danger:#d9534f;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh}
  .app{display:flex;min-height:100vh}
  .side{width:340px;min-width:340px;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:14px;gap:10px;overflow-y:auto;max-height:100vh}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  h1{font-size:18px;margin:0 0 2px;font-weight:650}
  h1 span{color:var(--accent)}
  .sub{color:var(--muted);font-size:12px;margin-bottom:6px}
  label.fld{display:flex;flex-direction:column;gap:4px;font-size:12.5px;color:var(--muted)}
  input[type=text], input[type=number], textarea{
    font:inherit;background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;width:100%}
  textarea{resize:vertical;min-height:44px}
  button{font:inherit;border:0;border-radius:8px;padding:9px 12px;cursor:pointer;
    background:var(--panel2);color:var(--text);border:1px solid var(--line);transition:.12s}
  button:hover{background:#363843}
  button:disabled{opacity:.45;cursor:not-allowed}
  button.primary{background:var(--accent);border-color:transparent;color:#fff;font-weight:600;width:100%}
  button.primary:hover{filter:brightness(1.08)}
  button.blue{background:var(--accent2);border-color:transparent;color:#fff;width:100%}
  .grp{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px;
    display:flex;flex-direction:column;gap:8px}
  .grp .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .styles{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;
    border:1px solid var(--line);border-radius:6px;padding:6px;background:var(--panel)}
  .styles label{display:flex;align-items:center;gap:7px;font-size:12.5px;cursor:pointer;padding:2px 3px}
  .styles label:hover{background:#31323b;border-radius:4px}
  .hint-sm{font-size:11px;color:var(--muted)}
  .progwrap{padding:12px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
  .progbar{height:8px;border-radius:5px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
  .progbar>i{display:block;height:100%;background:var(--accent);width:0%;transition:width .25s}
  .progtext{font-size:12.5px;color:var(--muted);margin-top:6px}
  .grid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;
    padding:16px;align-content:start;overflow-y:auto}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;overflow:hidden;
    display:flex;flex-direction:column}
  .card .th{width:100%;aspect-ratio:1/1;object-fit:contain;background:
      repeating-conic-gradient(#2a2b31 0% 25%, #34353d 0% 50%) 0 0/20px 20px}
  .card .nm{font-size:11px;padding:5px 7px;color:var(--muted);overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  .card.err{border-color:var(--danger)}
  .card.err .th{display:flex;align-items:center;justify-content:center;color:var(--danger);
    font-size:11px;text-align:center;padding:8px;background:#2a1f21}
  .card.pending .th{display:flex;align-items:center;justify-content:center;color:var(--muted);
    font-size:11px}
  .hint{color:var(--muted);text-align:center;padding:60px 30px;font-size:14px;margin:auto}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#000a;
    padding:8px 16px;border-radius:8px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:9}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div>
      <h1>Print <span>Factory</span></h1>
      <div class="sub">Панель генерации принтов пачками</div>
    </div>

    <div class="grp">
      <div class="lbl">Стили</div>
      <div class="styles" id="styles">Загрузка…</div>
      <div class="hint-sm">Без выбора — стиль по умолчанию. Несколько стилей — count раскидывается по кругу.</div>
    </div>

    <label class="fld">Тема
      <input type="text" id="theme" placeholder="напр. «поднятие уровня в одиночку», «тачки»">
    </label>

    <label class="fld">Персонажи (опционально)
      <textarea id="characters" placeholder="через запятую или с новой строки, если пусто — берём из темы (тайтла) или саму тему"></textarea>
    </label>

    <label class="fld">Количество
      <input type="number" id="count" value="6" min="1" max="50">
    </label>

    <button class="primary" id="genBtn">Генерировать</button>
    <div class="hint-sm" id="formErr" style="color:var(--danger)"></div>
  </aside>

  <main class="main">
    <div class="progwrap" id="progwrap" style="display:none">
      <div class="progbar"><i id="progbarInner"></i></div>
      <div class="progtext" id="progtext"></div>
      <button class="blue" id="dlBtn" style="margin-top:8px;display:none">Скачать ZIP</button>
    </div>
    <div class="grid" id="grid">
      <div class="hint" id="hint">Выбери стили, укажи тему или персонажей и нажми «Генерировать» — превью появятся здесь по мере готовности.</div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const stylesEl = $('#styles'), themeEl = $('#theme'), charsEl = $('#characters'),
      countEl = $('#count'), genBtn = $('#genBtn'), formErr = $('#formErr'),
      progwrap = $('#progwrap'), progbarInner = $('#progbarInner'), progtext = $('#progtext'),
      dlBtn = $('#dlBtn'), grid = $('#grid'), hint = $('#hint');

let pollTimer = null, currentJob = null;

function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}

async function loadStyles(){
  try{
    const res = await fetch('/api/styles');
    const list = await res.json();
    if(!Array.isArray(list) || !list.length){
      stylesEl.textContent = 'Стили не найдены (STYLE_BANK.json пуст?)';
      return;
    }
    stylesEl.innerHTML = '';
    list.forEach(s=>{
      const lab = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.value = s.id;
      lab.append(cb, document.createTextNode(' ' + (s.name_ru || s.id)));
      stylesEl.append(lab);
    });
  }catch(e){
    stylesEl.textContent = 'Ошибка загрузки стилей';
  }
}
loadStyles();

function selectedStyles(){
  return [...stylesEl.querySelectorAll('input:checked')].map(cb=>cb.value);
}

function cardFor(item){
  const div = document.createElement('div');
  if(item.ok){
    div.className = 'card';
    const img = document.createElement('img');
    img.className = 'th'; img.loading = 'lazy'; img.src = item.thumb_url;
    const nm = document.createElement('div');
    nm.className = 'nm'; nm.textContent = item.tag; nm.title = item.tag;
    div.append(img, nm);
  }else{
    div.className = 'card err';
    const th = document.createElement('div');
    th.className = 'th'; th.textContent = item.error || 'ошибка';
    const nm = document.createElement('div');
    nm.className = 'nm'; nm.textContent = item.tag; nm.title = item.tag;
    div.append(th, nm);
  }
  return div;
}

function renderItems(items){
  grid.innerHTML = '';
  items.forEach(it => grid.append(cardFor(it)));
}

async function pollJob(jobId){
  try{
    const res = await fetch(`/api/job/${jobId}`);
    if(!res.ok){ toast('Job не найден'); stopPoll(); return; }
    const job = await res.json();
    const total = job.total || 0;
    const pct = total ? Math.round(100 * job.done / total) : 0;
    progbarInner.style.width = pct + '%';
    progtext.textContent = job.status === 'queued'
      ? 'В очереди…'
      : `${job.done}/${total} готово (${job.status})`;
    renderItems(job.items || []);
    if(job.items && job.items.length) hint.style.display = 'none';

    if(job.status === 'error'){
      toast('Ошибка: ' + (job.error || 'неизвестно'));
      stopPoll();
      genBtn.disabled = false;
      return;
    }
    if(job.status === 'done'){
      stopPoll();
      genBtn.disabled = false;
      const okCount = (job.items||[]).filter(i=>i.ok).length;
      if(okCount){
        dlBtn.style.display = 'block';
        dlBtn.onclick = () => { window.location.href = `/api/download/${jobId}`; };
      }
      toast(`Готово: ${okCount}/${total}`);
    }
  }catch(e){
    // сетевой сбой опроса — не останавливаем, попробуем на следующем тике
  }
}

function stopPoll(){
  if(pollTimer){ clearInterval(pollTimer); pollTimer = null; }
}

genBtn.onclick = async () => {
  formErr.textContent = '';
  const styles = selectedStyles();
  const theme = themeEl.value.trim();
  const characters = charsEl.value.trim();
  const count = parseInt(countEl.value, 10) || 1;

  if(!theme && !characters){
    formErr.textContent = 'Укажи тему или персонажей.';
    return;
  }

  genBtn.disabled = true;
  hint.style.display = 'none';
  grid.innerHTML = '';
  progwrap.style.display = 'block';
  dlBtn.style.display = 'none';
  progbarInner.style.width = '0%';
  progtext.textContent = 'Запускаю…';

  try{
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({styles, count, theme, characters}),
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({detail:'ошибка запуска'}));
      throw new Error(err.detail || 'ошибка запуска');
    }
    const {job_id} = await res.json();
    currentJob = job_id;
    stopPoll();
    pollTimer = setInterval(() => pollJob(job_id), 1500);
    pollJob(job_id);
  }catch(e){
    formErr.textContent = e.message;
    genBtn.disabled = false;
    progwrap.style.display = 'none';
  }
};
</script>
</body>
</html>
